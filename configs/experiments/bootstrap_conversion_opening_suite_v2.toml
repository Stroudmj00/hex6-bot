[[scenarios]]
name = "o_must_block_horizontal_press"
description = "O must block X's horizontal threat while building a secondary horizontal attack."
placements = [
  [0, 0],
  [-6, 3], [-5, 3],
  [1, 0], [2, 0],
  [-4, 3], [6, 6],
  [3, 0], [4, 0],
]
expected_to_play = "o"
expected_placements_remaining = 2

