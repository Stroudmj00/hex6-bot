[[scenarios]]
name = "o_must_block_horizontal_press"
description = "O must block X's horizontal threat while building a secondary horizontal attack."
placements = [
  [0, 0],
  [-6, 3], [-5, 3],
  [1, 0], [2, 0],
  [-4, 3], [6, 6],
  [3, 0], [4, 0],
]
expected_to_play = "o"
expected_placements_remaining = 2

[[scenarios]]
name = "x_can_finish_horizontal"
description = "X to play has an immediate horizontal win."
placements = [
  [0, 0],
  [-7, 0], [-6, 0],
  [1, 0], [2, 0],
  [-7, 1], [-6, 1],
  [3, 0], [4, 0],
  [-7, 2], [-6, 2],
]
expected_to_play = "x"
expected_placements_remaining = 2

