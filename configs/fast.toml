[project]
name = "hex6"
phase = "fast_sprint"

[runtime]
python_version = "3.11"
preferred_device = "cuda"
allow_cpu_fallback = true
cpu_threads = 8
interop_threads = 2
enable_tf32 = true
cudnn_benchmark = true
record_resource_usage = true
resource_poll_seconds = 5.0

[game]
board_mode = "sparse_bounded"
board_width = 15
board_height = 15
board_center_q = 0
board_center_r = 0
coordinate_system = "axial"
players = ["x", "o"]
win_length = 6
opening_placements = 1
turn_placements = 2
contiguous_lines_only = true

[prototype]
analysis_margin = 8
outer_search_margin = 8
prune_globally_dead_cells = true
allow_long_range_islands = false
first_stone_candidate_limit = 6
second_stone_candidate_limit = 2
frontier_distance = 1
island_min_distance = 5
island_max_distance = 12
min_open_windows_for_island = 3

[search]
algorithm = "guided_mcts"
factorize_two_stone_actions = true
use_progressive_widening = true
use_transposition_table = true
root_simulations = 48
parallel_expansions_per_root = 1
tactical_solver = "threat_search"
shallow_reply_width = 1
reply_depth = 1
puct_exploration = 1.25
dirichlet_alpha = 0.35
dirichlet_epsilon = 0.25

[training]
bootstrap_strategy = "alphazero_self_play"
symmetry_augmentation = false
mixed_precision = true
self_play_workers = 4
data_loader_workers = 0
pin_memory = true
replay_buffer_size = 5000
bootstrap_games = 4
max_game_plies = 0
batch_size = 8
epochs = 1
learning_rate = 0.001
policy_target = "visit_distribution"
bootstrap_opening_suite = "configs/experiments/bootstrap_conversion_opening_suite.toml"
bootstrap_seeded_start_fraction = 0.75
self_play_temperature = 1.0
self_play_temperature_drop_ply = 24
self_play_temperature_after_drop = 0.2
reanalyse_fraction = 0.0
reanalyse_max_examples = 0

[model]
architecture = "hex_resnet_tiny"
board_crop_radius = 6
channels = 16
blocks = 2

[scoring]
frontier = 1.0
friendly_open_window = 1.5
enemy_open_window = 1.75
friendly_alignment = 3.0
enemy_alignment = 3.25
intersection = 1.25
island = 0.0
space = 0.25

[heuristic]
alignment_weights = [0.0, 1.0, 3.0, 9.0, 30.0, 120.0, 100000.0]
enemy_alignment_weights = [0.0, 1.25, 3.5, 10.0, 32.0, 125.0, 100000.0]
live_cell_weight = 0.1
candidate_score_weight = 0.25
terminal_score = 1000000.0
include_candidate_edge = false

[integration]
status_backend = "none"
github_repo = "Stroudmj00/hex6-bot"
github_branch = "colab-status"
github_base_branch = "main"
status_path = "status/latest.json"
run_history_path = "status/runs"
watch_poll_seconds = 5.0

[evaluation]
arena_games = 2
max_game_plies = 0
board_width_override = 0
board_height_override = 0
post_train_eval = "tournament"
post_train_max_game_plies = 0
post_train_opening_suite = "configs/experiments/conversion_opening_suite.toml"
promotion_games_per_match = 12
promotion_opening_suite = "configs/experiments/promotion_conversion_opening_suite.toml"
promotion_include_baseline = true
promotion_require_candidate_rank_one = true
promotion_min_score_delta = 0.5
initial_elo = 1200.0
k_factor = 24.0
model_policy_weight = 0.45
model_value_weight = 1.0
model_heuristic_weight = 0.015
record_game_history = true
