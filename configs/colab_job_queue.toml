[queue]
name = "hex6_colab_gpu_priority"
default_status_backend = "github_branch"
default_run_prefix = "colabq"
idle_sleep_seconds = 30
post_job_pause_seconds = 8

[[jobs]]
id = "cycle_main"
kind = "cycle"
priority = 100
enabled = true
min_interval_minutes = 0
max_consecutive_runs = 3
config = "configs/colab_strongest_v2.toml"
output_root = "artifacts/bootstrap_colab_strongest_v2"
minutes = 60

[[jobs]]
id = "tournament_regression"
kind = "tournament"
priority = 80
enabled = true
min_interval_minutes = 30
config = "configs/fast.toml"
output = "artifacts/tournament_colab"
games_per_match = 2
max_game_plies = 0
max_checkpoints = 3
checkpoint_glob = "artifacts/**/bootstrap_model.pt"
opening_suite = "configs/experiments/conversion_opening_suite.toml"
include_baseline = true
include_random = true
random_seed = 7

[[jobs]]
id = "search_matrix_regression"
kind = "search_matrix"
priority = 65
enabled = true
min_interval_minutes = 45
matrix = "configs/experiments/search_matrix.toml"
output = "artifacts/search_matrix_colab"

[[jobs]]
id = "bootstrap_refresh"
kind = "bootstrap"
priority = 50
enabled = true
min_interval_minutes = 120
config = "configs/colab.toml"
output = "artifacts/bootstrap_colab"
